name: Release

on:
  push:
    tags: ["v*"]
  # Lets the build/check half run without cutting a tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Check tag matches pyproject version
        if: github.ref_type == 'tag'
        # Guards against tagging the wrong commit — a vX.Y.Z tag must sit on
        # a commit whose pyproject.toml says X.Y.Z.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match pyproject.toml version $version" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: twine check --strict dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    # Owner setup (one-time, before the first tag):
    #   1. PyPI → scout-security → Settings → Publishing → add trusted
    #      publisher: owner Varpost, repo Scout, workflow release.yml,
    #      environment pypi.
    #   2. GitHub → repo Settings → Environments → create "pypi".
    environment:
      name: pypi
      url: https://pypi.org/project/scout-security/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish via OIDC (no API token)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub release
    if: github.ref_type == 'tag'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Create release with artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
