name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check scout/ tests/

      - name: Ruff format check
        run: ruff format --check scout/ tests/

      - name: Mypy type check
        run: mypy scout/

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage (floor 75%)
        # scout/ai/client.py is unwired scaffolding at 0% until T2.1 — the
        # floor is set with that already priced in (repo sits ~80%).
        run: pytest --cov=scout --cov-report=xml --cov-report=term-missing --cov-fail-under=75

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: pip-audit (dependency vulnerabilities)
        # Audit only the declared third-party deps. Scout itself is not on
        # PyPI yet, so we extract the dependency list from pyproject.toml
        # and audit that instead of the editable install.
        run: |
          python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print('\n'.join(d['project']['dependencies']))" > _audit_reqs.txt
          pip-audit --strict --desc --requirement _audit_reqs.txt

      - name: Ruff security rules
        run: ruff check scout/ --select S

      - name: Scout self-scan (dogfood, fails on HIGH+)
        # Whole repo. tests/ is excluded because fixtures AND scanner tests
        # embed deliberate findings as inputs — that's what they test.
        run: |
          pip install -e .
          scout scan . --no-ai --exclude tests --fail-on HIGH

  sarif:
    name: SARIF Upload (Code Scanning)
    runs-on: ubuntu-latest
    # The workflow-level `contents: read` would block the upload — this job
    # needs its own security-events grant.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Scout action (dogfood — source checkout)
        # Runs the composite action in action.yml; tests/ is excluded via
        # [tool.scout] in pyproject.toml. Gating stays with the security
        # job's dogfood step, so this never fails on findings.
        uses: ./
        with:
          fail-on: never
          install: "."

  uvx:
    name: uvx entry point (${{ matrix.os }})
    # Validates the zero-install `uvx scout-security` path README leads with,
    # against the local build (no dependency on a published PyPI release).
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2  # no floating v8 tag exists — pin the exact release

      - name: uvx --from . runs the scout entry point
        # --fail-on never: this checks the entry point resolves and runs, not
        # the findings (fixtures carry deliberate CRITICAL/HIGH ones).
        run: uvx --from . scout scan tests/fixtures/ --format json --fail-on never
