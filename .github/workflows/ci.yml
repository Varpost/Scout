name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check scout/ tests/

      - name: Ruff format check
        run: ruff format --check scout/ tests/

      - name: Mypy type check
        run: mypy scout/

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=scout --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: pip-audit (dependency vulnerabilities)
        # Audit only the declared third-party deps. Scout itself is not on
        # PyPI yet, so we extract the dependency list from pyproject.toml
        # and audit that instead of the editable install.
        run: |
          python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print('\n'.join(d['project']['dependencies']))" > _audit_reqs.txt
          pip-audit --strict --desc --requirement _audit_reqs.txt

      - name: Ruff security rules
        run: ruff check scout/ --select S

      - name: Scout self-scan (dogfood, fails on HIGH+)
        # Whole repo. tests/ is excluded because fixtures AND scanner tests
        # embed deliberate findings as inputs — that's what they test.
        run: |
          pip install -e .
          scout scan . --no-ai --exclude tests --fail-on HIGH
